name: build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

env:
  # GitHub removed the x-gha vcpkg cache backend; use vcpkg's default files cache
  # (~/.cache/vcpkg/archives) and persist it across runs with actions/cache below.
  VCPKG_BINARY_SOURCES: "clear;default,readwrite"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Free up disk space
        # Qt + FFmpeg built statically from source needs a lot of room; the
        # default runner ships ~14 GB free, so reclaim the large preinstalled SDKs.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /
      - name: Export GitHub Actions cache env (vcpkg)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake curl nasm \
            autoconf automake libtool libltdl-dev autoconf-archive pkg-config \
            bison flex gperf python3 python3-jinja2 python3-setuptools \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-dev \
            '^libxcb.*-dev' libx11-xcb-dev libxext-dev libxfixes-dev libxdamage-dev \
            libxrender-dev libxi-dev libxtst-dev libfontconfig1-dev libfreetype-dev \
            libdbus-1-dev libpulse-dev libasound2-dev libsm-dev libice-dev \
            libwayland-dev libwayland-bin wayland-protocols
      - name: Cache vcpkg binary archives
        # Persist built packages (ffmpeg, x264, qtbase, ...) so iterative CI fixes don't
        # rebuild everything (~35 min). Key on the manifest + pinned baseline.
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-${{ runner.os }}-a0400024-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-a0400024-
            vcpkg-${{ runner.os }}-
      - name: Setup vcpkg
        # Pin vcpkg to the exact commit used for the known-good local build so CI
        # installs the same package versions (matches builtin-baseline in vcpkg.json).
        run: |
          git clone https://github.com/microsoft/vcpkg "$HOME/vcpkg"
          git -C "$HOME/vcpkg" checkout a0400024711b283056538ac19ced80b91a83c24c
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
          echo "RR_TRIPLET=x64-linux" >> "$GITHUB_ENV"
      - name: Configure & build (static)
        run: |
          cmake --preset release-static
          cmake --build --preset release-static
      - name: Dump vcpkg logs on failure
        if: failure()
        run: |
          echo "=== vcpkg-manifest-install.log ==="
          cat build-static/vcpkg-manifest-install.log 2>/dev/null || true
          echo "=== port build error logs ==="
          find "$HOME/vcpkg/buildtrees" -name '*-err.log' -print -exec tail -40 {} \; 2>/dev/null | head -300 || true
      - name: Verify no dynamic Qt/libav deps
        run: |
          if ldd build-static/RegionRecord | grep -Ei 'qt|avcodec|avformat|avdevice|x264|swscale|swresample'; then
            echo "FAIL: dynamic dep"; exit 1
          else
            echo "OK: no dynamic Qt/libav/x264 deps"
          fi
      - name: Package AppImage
        run: ./packaging/linux/build-appimage.sh
      - name: Stage release binaries
        run: |
          mkdir -p dist
          cp build-static/RegionRecord dist/RegionRecord-x86_64-linux
          strip dist/RegionRecord-x86_64-linux   # drop ~100MB of debug symbols (~154MB -> ~58MB)
          chmod +x dist/RegionRecord-x86_64-linux dist/RegionRecord*.AppImage || true
          ls -la dist
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RegionRecord-linux
          path: |
            dist/RegionRecord*.AppImage
            dist/RegionRecord-x86_64-linux

  # ---------------------------------------------------------------------------
  # build-windows is enabled: the Windows backends (GDI capture, RegisterHotKey,
  # window picker, WASAPI audio) are implemented and CMake configures on Windows.
  # This job is compile-only verification; runtime correctness is checked by the
  # user on real hardware. build-macos (CGDisplay capture, Carbon hotkey, window
  # picker, AudioQueue audio) is likewise enabled and compile-only.
  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - uses: lukka/get-cmake@latest
      - name: Restore vcpkg binary archives
        # Persist built packages (ffmpeg, x264, qtbase, ...) so iterative CI fixes
        # don't rebuild everything. Windows' default files cache lives under LOCALAPPDATA.
        # Split restore/save (not the combined action) so the Save step below can run with
        # if: always() — the combined actions/cache skips its post-save when the job fails,
        # which would discard the ~90-min Qt/FFmpeg compile every time our build step errors.
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: ~\AppData\Local\vcpkg\archives
          key: vcpkg-${{ runner.os }}-a0400024-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-a0400024-
            vcpkg-${{ runner.os }}-
      - name: Setup vcpkg
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg "$HOME/vcpkg"
          # Pin to the builtin-baseline commit so CI installs the same versions.
          git -C "$HOME/vcpkg" checkout a0400024711b283056538ac19ced80b91a83c24c
          "$HOME/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
          echo "RR_TRIPLET=x64-windows-static" >> "$GITHUB_ENV"
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Configure & build (static)
        shell: bash
        run: |
          cmake --preset release-static
          cmake --build --preset release-static
      - name: Dump vcpkg logs on failure
        if: failure()
        shell: bash
        run: |
          echo "=== vcpkg-manifest-install.log ==="
          cat build-static/vcpkg-manifest-install.log 2>/dev/null || true
          echo "=== port build error logs ==="
          find "$HOME/vcpkg/buildtrees" -name '*-err.log' -print -exec tail -40 {} \; 2>/dev/null | head -300 || true
      - name: Save vcpkg binary archives
        # Save even when the build step fails so the expensive Qt/FFmpeg compile is cached for
        # the next run. Skip when the restore was an exact hit (the key already holds the data).
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~\AppData\Local\vcpkg\archives
          key: vcpkg-${{ runner.os }}-a0400024-${{ hashFiles('vcpkg.json') }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RegionRecord-windows
          path: build-static/RegionRecord.exe

  # build-macos is enabled: the macOS backends (Quartz CGDisplay capture, Carbon hotkey,
  # CGWindowList picker, CoreAudio AudioQueue) are implemented and CMake configures on macOS.
  # Compile-only verification; runtime correctness is checked by the user on real hardware.
  # Apple Silicon (arm64) only: builds a single native arm64 slice on the macos-14
  # runner. Intel (x86_64) macOS is not supported -- no universal (lipo) build.
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - uses: lukka/get-cmake@latest
      - name: Install build deps (vcpkg toolchain)
        # nasm for x264 asm; autotools + pkg-config + gperf for the ffmpeg/qtbase build chain.
        run: |
          brew install nasm autoconf automake autoconf-archive libtool pkg-config gperf
          python3 -m pip install --break-system-packages jinja2 || pip3 install jinja2 || true
      - name: Restore vcpkg binary archives
        # Split restore/save so the Save step can run with if: always() (see build-windows).
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-${{ runner.os }}-a0400024-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-a0400024-
            vcpkg-${{ runner.os }}-
      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg "$HOME/vcpkg"
          git -C "$HOME/vcpkg" checkout a0400024711b283056538ac19ced80b91a83c24c
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
          echo "RR_TRIPLET=arm64-osx" >> "$GITHUB_ENV"
      - name: Configure & build (static)
        run: |
          cmake --preset release-static
          cmake --build --preset release-static
      - name: Dump vcpkg logs on failure
        if: failure()
        run: |
          echo "=== vcpkg-manifest-install.log ==="
          cat build-static/vcpkg-manifest-install.log 2>/dev/null || true
          echo "=== port build error logs ==="
          find "$HOME/vcpkg/buildtrees" -name '*-err.log' -print -exec tail -40 {} \; 2>/dev/null | head -300 || true
      - name: Save vcpkg binary archives
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-${{ runner.os }}-a0400024-${{ hashFiles('vcpkg.json') }}
      - name: Assemble .app bundle
        run: |
          APP="dist/RegionRecord.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp packaging/macos/Info.plist "$APP/Contents/Info.plist"
          cp packaging/icon/RegionRecord.icns "$APP/Contents/Resources/RegionRecord.icns"
          cp build-static/RegionRecord "$APP/Contents/MacOS/RegionRecord"
          file "$APP/Contents/MacOS/RegionRecord"
      - name: Zip and upload
        run: |
          cd dist && zip -r RegionRecord-macos-arm64.zip RegionRecord.app
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RegionRecord-macos-arm64
          path: dist/RegionRecord-macos-arm64.zip

  # On tag (v*) pushes, attach the produced artifacts to a GitHub Release.
  # Linux, Windows and macOS all build green and contribute their artifact.
  release:
    needs: [ build-linux, build-windows, build-macos ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: RegionRecord ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/RegionRecord-linux/*
            artifacts/RegionRecord-windows/*
            artifacts/RegionRecord-macos-arm64/*
