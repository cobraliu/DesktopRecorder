name: build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Free up disk space
        # Qt + FFmpeg built statically from source needs a lot of room; the
        # default runner ships ~14 GB free, so reclaim the large preinstalled SDKs.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /
      - name: Export GitHub Actions cache env (vcpkg)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake curl nasm \
            autoconf automake libtool libltdl-dev autoconf-archive pkg-config \
            bison flex gperf python3 python3-jinja2 python3-setuptools \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-dev \
            '^libxcb.*-dev' libx11-xcb-dev libxext-dev libxfixes-dev libxdamage-dev \
            libxrender-dev libxi-dev libxtst-dev libfontconfig1-dev libfreetype-dev \
            libdbus-1-dev libpulse-dev libasound2-dev
      - name: Setup vcpkg
        # Pin vcpkg to the exact commit used for the known-good local build so CI
        # installs the same package versions (matches builtin-baseline in vcpkg.json).
        run: |
          git clone https://github.com/microsoft/vcpkg "$HOME/vcpkg"
          git -C "$HOME/vcpkg" checkout a0400024711b283056538ac19ced80b91a83c24c
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
          echo "RR_TRIPLET=x64-linux" >> "$GITHUB_ENV"
      - name: Configure & build (static)
        run: |
          cmake --preset release-static
          cmake --build --preset release-static
      - name: Dump vcpkg logs on failure
        if: failure()
        run: |
          echo "=== vcpkg-manifest-install.log ==="
          cat build-static/vcpkg-manifest-install.log 2>/dev/null || true
          echo "=== port build error logs ==="
          find "$HOME/vcpkg/buildtrees" -name '*-err.log' -print -exec tail -40 {} \; 2>/dev/null | head -300 || true
      - name: Verify no dynamic Qt/libav deps
        run: |
          if ldd build-static/RegionRecord | grep -Ei 'qt|avcodec|avformat|avdevice|x264|swscale|swresample'; then
            echo "FAIL: dynamic dep"; exit 1
          else
            echo "OK: no dynamic Qt/libav/x264 deps"
          fi
      - name: Package AppImage
        run: ./packaging/linux/build-appimage.sh
      - name: Stage release binaries
        run: |
          mkdir -p dist
          cp build-static/RegionRecord dist/RegionRecord-x86_64-linux
          strip dist/RegionRecord-x86_64-linux   # drop ~100MB of debug symbols (~154MB -> ~58MB)
          chmod +x dist/RegionRecord-x86_64-linux dist/RegionRecord*.AppImage || true
          ls -la dist
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RegionRecord-linux
          path: |
            dist/RegionRecord*.AppImage
            dist/RegionRecord-x86_64-linux

  # ---------------------------------------------------------------------------
  # Windows / macOS jobs: scaffolding is ready, but currently disabled via `if: false`.
  # Reason: the recording and global hotkey backends are currently Linux-only
  # (src/recording/X11FrameSource.cpp, src/platform/GlobalHotkeyX11.cpp), and the
  # top-level CMakeLists `find_package(X11 REQUIRED)` fails to configure on non-Linux
  # platforms. The spec explicitly schedules the Win/mac platform backends for phase two.
  # Once phase two adds DXGI/AVFoundation screen capture + per-platform hotkeys and makes
  # the X11 dependency conditional, removing the `if: false` from the two jobs below enables them.
  # ---------------------------------------------------------------------------
  build-windows:
    if: false
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - uses: lukka/get-cmake@latest
      - name: Setup vcpkg
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.bat"
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
          echo "RR_TRIPLET=x64-windows-static" >> "$GITHUB_ENV"
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Configure & build (static)
        shell: bash
        run: |
          cmake --preset release-static
          cmake --build --preset release-static
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RegionRecord-windows
          path: build-static/RegionRecord.exe

  build-macos:
    if: false
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - uses: lukka/get-cmake@latest
      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
      - name: Build arm64
        run: |
          RR_TRIPLET=arm64-osx cmake --preset release-static -B build-arm64
          cmake --build build-arm64
      - name: Build x86_64
        run: |
          RR_TRIPLET=x64-osx cmake --preset release-static -B build-x64
          cmake --build build-x64
      - name: Assemble universal .app
        run: |
          APP="dist/RegionRecord.app"
          mkdir -p "$APP/Contents/MacOS"
          cp packaging/macos/Info.plist "$APP/Contents/Info.plist"
          lipo -create build-arm64/RegionRecord build-x64/RegionRecord \
            -output "$APP/Contents/MacOS/RegionRecord"
          lipo -info "$APP/Contents/MacOS/RegionRecord"
      - name: Zip and upload
        run: |
          cd dist && zip -r RegionRecord-macos.zip RegionRecord.app
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RegionRecord-macos
          path: dist/RegionRecord-macos.zip

  # On tag (v*) pushes, attach the produced artifacts to a GitHub Release.
  # Only Linux can be built for now, so this depends only on build-linux; once Win/mac are enabled, add them to needs and files.
  release:
    needs: [ build-linux ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: RegionRecord ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/RegionRecord-linux/*
